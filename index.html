<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHeE T-OS V1.0.0 旗艦用戶版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
                (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        });
        setInterval(function() { function df() { debugger; } df(); }, 100);
    </script>
    <style>
        :root {
            --bg: #060709;
            --sidebar: #0e1118;
            --panel: #12161f;
            --acc: #23a559;
            --cyan: #45f3ff;
            --text: #fff;
            --danger: #ff4d4d;
            --gold: #e2b43c;
            --purple: #a345ff;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-card { background: var(--panel); border: 1px solid #252d3a; padding: 35px; border-radius: 16px; width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border-top: 4px solid var(--cyan); text-align: center; }
        .login-card h2 { color: var(--cyan); font-weight: 900; margin: 0 0 20px; font-size: 24px; letter-spacing: 1px; }
        .login-card input { width: 100%; padding: 12px; background: #090c11; border: 1px solid #2d3748; border-radius: 8px; color: #fff; margin-bottom: 15px; outline: none; font-size: 14px; }
        .login-card input:focus { border-color: var(--cyan); }
        .login-card button { width: 100%; padding: 12px; background: var(--cyan); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .login-card button:hover { box-shadow: 0 0 15px var(--cyan); opacity: 0.9; }

        #app-layout { display: none; width: 100vw; height: 100vh; }
        .sidebar { width: 72px; background: var(--sidebar); border-right: 1px solid #161b26; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 18px; justify-content: space-between; }
        .side-icon-btn { width: 48px; height: 48px; background: #1a202c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #8a9fc2; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #252d3a; }
        .side-icon-btn:hover, .side-icon-btn.active { border-radius: 14px; background: var(--cyan); color: #000; box-shadow: 0 0 12px var(--cyan); }
        .side-icon-btn.active-ch { border-radius: 14px; background: var(--gold); color: #000; box-shadow: 0 0 12px var(--gold); }
        .sidebar-pfp { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #252d3a; cursor: pointer; }

        .ch-sidebar { width: 240px; background: #10141d; border-right: 1px solid #161b26; display: flex; flex-direction: column; padding: 15px; }
        .ch-sidebar h3 { font-size: 12px; color: #5c6e88; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 15px 5px; font-weight: bold; }
        .ch-list-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; font-size: 14px; color: #b9bbbe; font-weight: 500; }
        .ch-list-item:hover { background: #1a212f; color: #fff; }
        .ch-list-item.active { background: #232a37; color: #fff; border-left: 3px solid var(--cyan); }
        .ch-avatar-mini { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: #222; }

        .main-chat-zone { flex: 1; display: flex; flex-direction: column; background: #141923; position: relative; }
        .chat-header { height: 64px; border-bottom: 1px solid #161b26; display: flex; align-items: center; padding: 0 20px; background: var(--panel); justify-content: space-between; }
        .chat-header-info { display: flex; align-items: center; gap: 10px; }
        .chat-header-title { font-weight: bold; font-size: 16px; color: #fff; }
        .chat-header-desc { font-size: 12px; color: #72767d; }

        .chat-messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 12px; align-items: flex-start; max-width: 85%; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; transition: 0.2s; background: #222; border: 1px solid #2d3748; }
        .msg-avatar:hover { transform: scale(1.05); }
        .msg-content-area { display: flex; flex-direction: column; }
        .msg-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 4px; }
        .msg-username { font-weight: 600; color: #fff; }
        .msg-ts { color: #72767d; font-size: 11px; }
        .msg-body { background: #1e2533; padding: 10px 14px; border-radius: 0 12px 12px 12px; font-size: 14px; color: #dcddde; line-height: 1.4; word-break: break-all; width: fit-content; }
        .msg-img { max-width: 280px; max-height: 200px; border-radius: 8px; margin-top: 5px; border: 1px solid #2d3748; cursor: pointer; display: block; }
        
        .chat-input-area { height: 68px; background: var(--panel); border-top: 1px solid #161b26; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .input-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
        .chat-input { width: 100%; padding: 12px 45px 12px 15px; background: #090c11; border: 1px solid #2d3748; border-radius: 8px; color: #fff; outline: none; font-size: 14px; }
        .chat-input:focus { border-color: var(--cyan); }
        .media-btn { position: absolute; right: 15px; color: #72767d; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .media-btn:hover { color: var(--cyan); }
        .send-btn { width: 44px; height: 44px; background: var(--cyan); border: none; border-radius: 8px; color: #000; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { box-shadow: 0 0 12px var(--cyan); opacity: 0.9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--panel); border: 2px solid var(--cyan); width: 400px; padding: 25px; border-radius: 16px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; color: #72767d; cursor: pointer; font-size: 20px; }
        .close-modal:hover { color: #fff; }

        .profile-card { background: var(--panel); border: 1px solid #252d3a; width: 350px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); position: relative; }
        .profile-banner { height: 100px; background: var(--acc); position: relative; }
        .profile-pfp-wrapper { position: absolute; top: 50px; left: 20px; }
        .profile-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 4px solid var(--panel); background: #222; }
        .profile-body { padding: 45px 20px 20px; }
        .profile-name { font-size: 18px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 6px; }
        .profile-uid { font-size: 13px; color: #72767d; margin-top: 2px; }
        .profile-badges { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
        .profile-bio-box { background: #090c11; border: 1px solid #1e2533; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 13px; color: #dcddde; min-height: 50px; word-break: break-all; }

        .btn-danger { width: 100%; padding: 11px; background: var(--danger); color: #fff; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-danger:hover { box-shadow: 0 0 12px var(--danger); opacity: 0.9; }
        label { display: block; font-size: 11px; color: #72767d; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; margin-top: 12px; }
        #pane-settings-view input, #pane-settings-view textarea { width: 100%; padding: 10px; background: #090c11; border: 1px solid #2d3748; border-radius: 8px; color: #fff; outline: none; font-size: 13px; }
        #pane-settings-view input:focus, #pane-settings-view textarea:focus { border-color: var(--cyan); }
        #pane-settings-view button { width: 100%; padding: 11px; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        #pane-settings-view button:hover { opacity: 0.9; }
        .badge-system-offi { background: var(--danger); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-custom { background: #3b82f6; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>FHeE T-OS</h2>
            <input id="login-uid" placeholder="使用者帳號 (UID)">
            <input id="login-pw" type="password" placeholder="登入密碼">
            <button onclick="handleLogin()">登入系統</button>
        </div>
    </div>

    <div id="app-layout">
        <div class="sidebar">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 18px; width: 100%;">
                <div class="side-icon-btn active" id="btn-nav-chat" onclick="switchView('chat')">
                    <i class="fa-solid fa-comments"></i>
                </div>
                <div class="side-icon-btn" id="btn-nav-settings" onclick="switchView('settings')">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
            </div>
            <div>
                <img class="sidebar-pfp" id="my-avatar" src="" onclick="openMyProfile()">
            </div>
        </div>

        <div class="ch-sidebar" id="pane-channels">
            <h3>文字頻道</h3>
            <div id="channel-list-box"></div>
        </div>

        <div class="main-chat-zone" id="pane-chat-view">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-header-title" id="active-ch-title">載入中...</div>
                    <div class="chat-header-desc" id="active-ch-desc"></div>
                </div>
            </div>

            <div class="chat-messages-container" id="chat-flow"></div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input class="chat-input" id="message-input" placeholder="選擇頻道發送通訊...">
                    <i class="fa-solid fa-image media-btn" onclick="triggerImageUpload()"></i>
                </div>
                <button class="send-btn" onclick="sendTextMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="main-chat-zone" id="pane-settings-view" style="display: none; padding: 40px; overflow-y: auto;">
            <h2 style="font-size: 24px; color: var(--cyan); border-bottom: 2px solid #222; padding-bottom: 15px;"><i class="fa-solid fa-sliders"></i> 個人核心設定面板</h2>
            <div style="max-width: 500px; background: var(--panel); border: 1px solid #252d3a; padding: 25px; border-radius: 12px; margin-top: 20px;">
                <label>更換顯示名稱</label>
                <input id="set-username">
                <label>更換頭像網址 (URL)</label>
                <input id="set-avatar">
                <label>更換個人橫幅 (可填十六進位色彩代碼或圖片網址)</label>
                <input id="set-banner">
                <label>更換個人自介</label>
                <textarea id="set-bio" rows="3"></textarea>
                <button onclick="saveMySettings()" style="background: var(--gold); color: #000; margin-top: 20px;"><i class="fa-solid fa-floppy-disk"></i> 儲存並同步我的設定</button>
                <button class="btn-danger" style="margin-top: 15px;" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> 安全登出此帳戶</button>
            </div>
        </div>
    </div>

    <div id="ann-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--purple); border-color: #333;"><i class="fa-solid fa-bullhorn"></i> 官方至高廣播公告</h2>
            <div id="ann-title-text" style="font-weight: bold; font-size: 16px; margin: 15px 0 5px; color: #fff;"></div>
            <div id="ann-content-text" style="font-size: 14px; color: #dcddde; line-height: 1.5; background: #090c11; padding: 12px; border-radius: 8px;"></div>
            <button onclick="closeAnnModal()" style="background: var(--purple); color: #fff; margin-top: 15px;">確認並關閉</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" onclick="closeProfileModal()">
        <div class="profile-card" onclick="event.stopPropagation()">
            <div class="profile-banner" id="prof-banner"></div>
            <div class="profile-pfp-wrapper">
                <img class="profile-pfp" id="prof-pfp" src="">
            </div>
            <div class="profile-body">
                <div class="profile-name" id="prof-name"></div>
                <div class="profile-uid" id="prof-uid"></div>
                <div class="profile-badges" id="prof-badges"></div>
                <div style="font-size: 12px; color: #aaa; font-weight: bold; margin-top: 15px;">個人簡介</div>
                <div class="profile-bio-box" id="prof-bio"></div>
            </div>
        </div>
    </div>
        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT5bxjkt2xzABRaNaDFyV1zKg5R_yKxzo",
            authDomain: "fhee-e6867.firebaseapp.com",
            projectId: "fhee-e6867",
            storageBucket: "fhee-e6867.firebasestorage.app",
            databaseURL: "https://fhee-e6867-default-rtdb.firebaseio.com",
            messagingSenderId: "1054442416669",
            appId: "1:1054442416669:web:60f1c44f5dba08d0c174f4",
            measurementId: "G-VWRBQ1HC24"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUid = "";
        let myData = {};
        let activeChannelId = "ch1";
        let channelsConfig = {};
        let globalUsers = {};

        window.onload = function() {
            const autoUid = localStorage.getItem("fhee_logged_uid");
            const autoTs = localStorage.getItem("fhee_login_ts") || 0;
            if (autoUid) {
                db.ref(`users/${autoUid}`).get().then(snap => {
                    const u = snap.val();
                    if (snap.exists() && u.status !== "停權" && (!u.force_logout_ts || u.force_logout_ts <= autoTs)) {
                        myUid = autoUid;
                        myData = u;
                        initSystem();
                    } else {
                        localStorage.clear();
                    }
                }).catch(() => { localStorage.clear(); });
            }
        };

        function handleLogin() {
            const uidInput = document.getElementById("login-uid").value.trim().toLowerCase();
            const pwInput = document.getElementById("login-pw").value.trim();
            if (!uidInput || !pwInput) return alert("請輸入帳號與密碼");

            db.ref(`users/${uidInput}`).get().then(snap => {
                if (!snap.exists()) return alert("驗證失敗：帳號不存在或驗證密碼錯誤");
                const u = snap.val();
                if (u.status === "停權") return alert("該帳號已被系統限制登入");
                if (u.password === pwInput) {
                    myUid = uidInput;
                    myData = u;
                    localStorage.setItem("fhee_logged_uid", myUid);
                    localStorage.setItem("fhee_login_ts", Date.now());
                    initSystem();
                } else {
                    alert("驗證失敗：帳號不存在或驗證密碼錯誤");
                }
            });
        }

        function initSystem() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app-layout").style.display = "flex";
            document.getElementById("my-avatar").src = myData.avatar || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150";

            db.ref(`users/${myUid}`).on("value", snap => {
                if (!snap.exists()) { handleLogout(); return; }
                const u = snap.val();
                if (u.status === "停權") { handleLogout(); return; }
                const localTs = localStorage.getItem("fhee_login_ts") || 0;
                if (u.force_logout_ts && u.force_logout_ts > localTs) { handleLogout(); return; }
                myData = u;
                document.getElementById("my-avatar").src = myData.avatar;
            });

            db.ref("users").on("value", snap => { globalUsers = snap.val() || {}; });
            
            db.ref("system_announcement").on("value", snap => {
                if (snap.exists()) {
                    const ann = snap.val();
                    document.getElementById("ann-title-text").innerText = ann.title;
                    document.getElementById("ann-content-text").innerText = ann.content;
                    document.getElementById("ann-modal").style.display = "flex";
                }
            });

            db.ref("channels_config").on("value", snap => {
                channelsConfig = snap.val() || {};
                renderChannelsMenu();
            });
        }

        function renderChannelsMenu() {
            const box = document.getElementById("channel-list-box");
            box.innerHTML = "";

            const mainChs = [
                { id: "ch1", title: "全球大廳", pfp: "https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=150" },
                { id: "ch2", title: channelsConfig.ch2_title || "頻道 2", pfp: channelsConfig.ch2_pfp },
                { id: "ch3", title: channelsConfig.ch3_title || "頻道 3", pfp: channelsConfig.ch3_pfp },
                { id: "ch4", title: channelsConfig.ch4_title || "頻道 4", pfp: channelsConfig.ch4_pfp }
            ];

            mainChs.forEach(ch => {
                const div = document.createElement("div");
                div.className = `ch-list-item ${activeChannelId === ch.id ? "active" : ""}`;
                div.onclick = () => selectChannel(ch.id, ch.title, "文字聊天頻道");
                div.innerHTML = `<img class="ch-avatar-mini" src="${ch.pfp || 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=150'}"> <span>${escapeHTML(ch.title)}</span>`;
                box.appendChild(div);
            });

            const ch5Title = channelsConfig.ch5_title || "商業合作專區";
            const ch5Pfp = channelsConfig.ch5_pfp || "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150";
            
            if (channelsConfig.ch5_subs) {
                Object.keys(channelsConfig.ch5_subs).forEach(subId => {
                    const sub = channelsConfig.ch5_subs[subId];
                    if (sub.visible) {
                        const div = document.createElement("div");
                        div.className = `ch-list-item ${activeChannelId === subId ? "active" : ""}`;
                        div.onclick = () => selectChannel(subId, `${ch5Title} > ${sub.name}`, `授權發言標籤: ${sub.requiredBadge || '不限'}`);
                        div.innerHTML = `<img class="ch-avatar-mini" src="${ch5Pfp}"> <span>${escapeHTML(sub.name)}</span>`;
                        box.appendChild(div);
                    }
                });
            }

            if (!document.querySelector(".ch-list-item.active") && activeChannelId !== "ch1") {
                selectChannel("ch1", "全球大廳", "文字聊天頻道");
            } else {
                refreshChatHeader();
            }
        }

        function selectChannel(id, title, desc) {
            db.ref(`messages/${activeChannelId}`).off();
            activeChannelId = id;
            document.getElementById("active-ch-title").innerText = title;
            document.getElementById("active-ch-desc").innerText = desc;
            
            document.querySelectorAll(".ch-list-item").forEach(item => {
                if (item.innerText.includes(title.split(" > ").pop())) {
                    item.classList.add("active");
                } else {
                    item.classList.remove("active");
                }
            });

            listenToMessages();
        }

        function refreshChatHeader() {
            const currentItem = document.querySelector(".ch-list-item.active");
            if (!currentItem && activeChannelId === "ch1") {
                document.getElementById("active-ch-title").innerText = "全球大廳";
                document.getElementById("active-ch-desc").innerText = "文字聊天頻道";
            }
        }

        function listenToMessages() {
            const box = document.getElementById("chat-flow");
            box.innerHTML = "";

            db.ref(`messages/${activeChannelId}`).limitToLast(100).on("value", snap => {
                box.innerHTML = "";
                if (!snap.exists()) return;

                snap.forEach(child => {
                    const m = child.val();
                    const sender = globalUsers[m.uid] || {};
                    const name = sender.username || m.username || "未知用戶";
                    const pfp = sender.avatar || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150";
                    const role = sender.role || m.role || "user";
                    const badge = sender.customBadge || m.customBadge || "";
                    const time = new Date(m.ts).toLocaleTimeString();

                    let badgesHTML = "";
                    if (role === "admin") badgesHTML += `<span class="badge-system-offi">官方 ✔</span>`;
                    if (badge) badgesHTML += `<span class="badge-custom">${escapeHTML(badge)}</span>`;

                    let bodyHTML = `<div class="msg-body">${escapeHTML(m.text)}</div>`;
                    if (m.type === "image") {
                        bodyHTML = `<img src="${encodeURI(m.imageUrl)}" class="msg-img" onclick="window.open('${encodeURI(m.imageUrl)}','_blank')">`;
                    }

                    const div = document.createElement("div");
                    div.className = "msg-row";
                    div.innerHTML = `
                        <img class="msg-avatar" src="${pfp}" onclick="openUserProfile('${m.uid}')">
                        <div class="msg-content-area">
                            <div class="msg-meta">
                                <span class="msg-username">${escapeHTML(name)}</span>
                                ${badgesHTML}
                                <span class="msg-ts">${time}</span>
                            </div>
                            ${bodyHTML}
                        </div>
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendTextMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text) return;

            if (activeChannelId.startsWith("ch5_sub")) {
                const subConf = channelsConfig.ch5_subs ? channelsConfig.ch5_subs[activeChannelId] : null;
                if (subConf && subConf.requiredBadge && myData.customBadge !== subConf.requiredBadge && myData.role !== "admin") {
                    alert(`權限不足：此頻道限制擁有 [${subConf.requiredBadge}] 標籤之成員發言！`);
                    return;
                }
            }

            db.ref(`messages/${activeChannelId}`).push({
                uid: myUid,
                username: myData.username,
                text: text,
                ts: Date.now(),
                type: "text",
                role: myData.role,
                customBadge: myData.customBadge || ""
            }).then(() => { input.value = ""; });
        }

        function triggerImageUpload() {
            const url = prompt("請輸入欲發送的圖片網址 (URL)：");
            if (!url) return;

            if (activeChannelId.startsWith("ch5_sub")) {
                const subConf = channelsConfig.ch5_subs ? channelsConfig.ch5_subs[activeChannelId] : null;
                if (subConf && subConf.requiredBadge && myData.customBadge !== subConf.requiredBadge && myData.role !== "admin") {
                    alert(`權限不足：此頻道限制擁有 [${subConf.requiredBadge}] 標籤之成員發言！`);
                    return;
                }
            }

            db.ref(`messages/${activeChannelId}`).push({
                uid: myUid,
                username: myData.username,
                imageUrl: url,
                ts: Date.now(),
                type: "image",
                role: myData.role,
                customBadge: myData.customBadge || ""
            });
        }

        document.getElementById("message-input").addEventListener("keydown", e => {
            if (e.keyCode === 13) sendTextMessage();
        });

        function switchView(view) {
            document.getElementById("btn-nav-chat").classList.remove("active");
            document.getElementById("btn-nav-settings").classList.remove("active");
            
            if (view === "chat") {
                document.getElementById("btn-nav-chat").classList.add("active");
                document.getElementById("pane-channels").style.display = "flex";
                document.getElementById("pane-chat-view").style.display = "flex";
                document.getElementById("pane-settings-view").style.display = "none";
            } else if (view === "settings") {
                document.getElementById("btn-nav-settings").classList.add("active");
                document.getElementById("pane-channels").style.display = "none";
                document.getElementById("pane-chat-view").style.display = "none";
                document.getElementById("pane-settings-view").style.display = "block";

                document.getElementById("set-username").value = myData.username || "";
                document.getElementById("set-avatar").value = myData.avatar || "";
                document.getElementById("set-banner").value = myData.banner || "";
                document.getElementById("set-bio").value = myData.bio || "";
            }
        }

        function saveMySettings() {
            const name = document.getElementById("set-username").value.trim();
            const pfp = document.getElementById("set-avatar").value.trim();
            const bnr = document.getElementById("set-banner").value.trim();
            const bio = document.getElementById("set-bio").value.trim();

            if (!name) return alert("顯示名稱不能為空");

            db.ref(`users/${myUid}`).update({
                username: name,
                avatar: pfp || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150",
                banner: bnr || "#23a559",
                bio: bio || "該用戶很懶，什麼都沒留下..."
            }).then(() => { alert("個人設定修改成功！已即時套用全系統！"); });
        }

        function openUserProfile(uid) {
            db.ref(`users/${uid}`).get().then(snap => {
                if (!snap.exists()) return;
                const u = snap.val();

                const bannerEl = document.getElementById("prof-banner");
                if (u.banner && (u.banner.startsWith("http://") || u.banner.startsWith("https://") || u.banner.includes("."))) {
                    bannerEl.style.background = `url('${encodeURI(u.banner)}') center/cover no-repeat`;
                } else {
                    bannerEl.style.background = u.banner || "var(--acc)";
                }

                document.getElementById("prof-pfp").src = u.avatar || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150";
                document.getElementById("prof-name").innerText = u.username || "未命名";
                document.getElementById("prof-uid").innerText = `@${uid}`;
                document.getElementById("prof-bio").innerText = u.bio || "該用戶很懶，什麼都沒留下...";

                const badgeBox = document.getElementById("prof-badges");
                badgeBox.innerHTML = "";
                if (u.role === "admin") badgeBox.innerHTML += `<span class="badge-system-offi">官方 ✔</span>`;
                if (u.customBadge) badgeBox.innerHTML += `<span class="badge-custom">${escapeHTML(u.customBadge)}</span>`;

                document.getElementById("profile-modal").style.display = "flex";
            });
        }

        function openMyProfile() { openUserProfile(myUid); }
        function closeProfileModal() { document.getElementById("profile-modal").style.display = "none"; }
        function closeAnnModal() { document.getElementById("ann-modal").style.display = "none"; }

        function handleLogout() {
            localStorage.clear();
            location.reload();
        }

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
