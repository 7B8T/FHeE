<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FHeE 社群平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --acc: #23a559; --text: #fff; --panel: #0a0a0a; --danger: #ff4d4d; }
        body { margin:0; background:#000; color: #fff; font-family: sans-serif; overflow:hidden; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; z-index: 10; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #s-intro { background: #fff; }
        .tacker-logo { font-weight: 900; font-size: 85px; color: #000; }
        .entry-btn { margin-top: 50px; padding: 15px 60px; background: #000; color: #fff; border-radius: 50px; cursor: pointer; border: none; }
        #loading-wrap { display: none; text-align: center; width: 100%; height: 100%; background: #000; position: absolute; top:0; left:0; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .mc-spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--acc); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-wrap">
        <div class="mc-spinner"></div>
        <div id="load-num" style="margin-top:15px; font-weight:bold;">0%</div>
    </div>
    <section id="s-intro" class="screen active">
        <div class="tacker-logo">FHeE</div>
        <button id="start-btn" class="entry-btn" onclick="runLoadingAnimation()">進入系統</button>
    </section>
    <section id="s-login" class="screen">
        <div style="background:#12161f; padding:30px; border-radius:20px; width:300px;">
            <h2 style="margin-top:0;">帳戶驗證</h2>
            <input id="u-id" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;" placeholder="帳號 ID">
            <input id="u-pw" type="password" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333;" placeholder="驗證密碼">
            <button id="login-action-btn" onclick="performAuth()" style="width:100%; padding:10px; margin-top:15px; background:var(--acc); border:none; color:#fff; cursor:pointer;">登入平台</button>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT5bxjkt2xzABRaNaDFyV1zKg5R_yKxzo",
            authDomain: "fhee-e6867.firebaseapp.com",
            projectId: "fhee-e6867",
            storageBucket: "fhee-e6867.firebasestorage.app",
            databaseURL: "https://fhee-e6867-default-rtdb.firebaseio.com",
            messagingSenderId: "1054442416669",
            appId: "1:1054442416669:web:60f1c44f5dba08d0c174f4",
            measurementId: "G-VWRBQ1HC24"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUid = "", myUserData = {}, activeChannelId = "ch1";

        function runLoadingAnimation() {
            document.getElementById('s-intro').classList.remove('active');
            const wrap = document.getElementById('loading-wrap');
            wrap.style.display = 'flex';
            let p = 0;
            const timer = setInterval(() => {
                p += 5;
                document.getElementById('load-num').innerText = p + '%';
                if(p >= 100) {
                    clearInterval(timer);
                    wrap.style.display = 'none';
                    checkAutoLogin();
                }
            }, 100);
        }

        function checkAutoLogin() {
            const savedUid = localStorage.getItem('fhee_uid');
            if(savedUid) {
                db.ref('users/' + savedUid).get().then(snap => {
                    if(snap.exists()) {
                        myUid = savedUid;
                        myUserData = snap.val();
                        enterApp();
                    } else { showLogin(); }
                });
            } else { showLogin(); }
        }

        function showLogin() { document.getElementById('s-login').classList.add('active'); }

        function performAuth() {
            const uid = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            db.ref('users/' + uid).get().then(snap => {
                if(snap.exists() && snap.val().password === pw) {
                    myUid = uid;
                    myUserData = snap.val();
                    localStorage.setItem('fhee_uid', myUid);
                    document.getElementById('s-login').classList.remove('active');
                    enterApp();
                } else { alert("登入失敗"); }
            });
        }
        function enterApp() {
            // 這裡直接將畫面跳轉至主應用
            document.body.innerHTML = `
                <div style="display:flex; height:100vh; background:#0e1118; color:#fff;">
                    <nav style="width:75px; background:#050505; display:flex; flex-direction:column; align-items:center; padding:15px 0;">
                        <div style="width:50px; height:50px; background:var(--acc); border-radius:15px; margin-bottom:15px; display:flex; align-items:center; justify-content:center;">#</div>
                    </nav>
                    <main style="flex-grow:1; display:flex; flex-direction:column;">
                        <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding:20px;"></div>
                        <div style="padding:15px; background:#07090e; display:flex; gap:10px;">
                            <input type="file" id="f-in" style="display:none;" onchange="uploadImage(this)">
                            <label for="f-in" style="cursor:pointer; color:var(--acc); font-size:20px;">+</label>
                            <input id="m-input" style="flex-grow:1; background:#161b26; border:none; color:#fff; padding:10px;" placeholder="發送訊息...">
                            <button onclick="sendMessage()" style="background:var(--acc); border:none; padding:5px 15px; color:#fff;">發送</button>
                        </div>
                    </main>
                </div>
            `;
            listenMessages();
        }

        function listenMessages() {
            db.ref('messages/' + activeChannelId).on('value', snap => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    const row = document.createElement('div');
                    row.style.marginBottom = "10px";
                    row.innerHTML = `
                        <strong>${m.username || '匿名'}:</strong> ${m.type === 'image' ? `<img src="${m.imageUrl}" style="max-width:200px; display:block; margin-top:5px;">` : m.text}
                        <i class="fa-solid fa-trash" style="margin-left:10px; cursor:pointer; font-size:12px; color:var(--danger);" onclick="deleteMsg('${child.key}')"></i>
                    `;
                    flow.appendChild(row);
                });
            });
        }

        function sendMessage() {
            const input = document.getElementById('m-input');
            if(!input.value.trim()) return;
            db.ref('messages/' + activeChannelId).push({
                username: myUserData.username || "用戶",
                text: input.value,
                ts: Date.now(),
                type: 'text'
            });
            input.value = "";
        }

        function uploadImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('messages/' + activeChannelId).push({
                    username: myUserData.username || "用戶",
                    imageUrl: e.target.result,
                    ts: Date.now(),
                    type: 'image'
                });
            };
            reader.readAsDataURL(file);
        }

        function deleteMsg(key) {
            db.ref('messages/' + activeChannelId + '/' + key).remove();
        }
    </script>
</body>
</html>
