<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FHeE T-OS 正式防錯完整版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
                (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        });
        setInterval(function() { function df() { debugger; } df(); }, 100);
    </script>
    <style>
        :root { 
            --bg: #000; 
            --acc: #23a559; 
            --text: #fff; 
            --sub: #888; 
            --gold: #e2b43c; 
            --panel: #0a0a0a;
            --danger: #ff4d4d;
        }
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; color: var(--text); }
        
        #auth-container {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background:#000; z-index:9999; display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:20px;
        }
        .auth-card {
            background: var(--panel); border: 1px solid #1a1a1a;
            border-radius: 16px; padding:30px; width:100%; max-width:380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align:center;
        }
        .auth-logo { font-size:28px; font-weight:900; color:var(--text); margin-bottom:5px; letter-spacing:2px; }
        .auth-subtitle { font-size:12px; color:var(--sub); margin-bottom:25px; }
        .auth-input-group { position:relative; margin-bottom:16px; text-align:left; }
        .auth-input-group label { display:block; font-size:11px; color:var(--sub); margin-bottom:6px; font-weight:600; text-transform:uppercase; }
        .auth-input-group input {
            width:100%; background:#111; border:1px solid #222; border-radius:8px;
            padding:12px 14px; color:#fff; font-size:14px; outline:none; transition:0.2s;
        }
        .auth-input-group input:focus { border-color: var(--acc); background:#151515; }
        .auth-btn {
            width:100%; background:var(--acc); color:#fff; border:none; border-radius:8px;
            padding:14px; font-size:14px; font-weight:bold; cursor:pointer; margin-top:10px; transition:0.2s;
        }
        .auth-btn:hover { background:#1e8e4c; }

        #os-main-layout { display:none; height:100%; width:100%; display:flex; }
        .os-sidebar { width:72px; background:#050505; border-right:1px solid #111; display:flex; flex-direction:column; align-items:center; padding:15px 0; justify-content:space-between; }
        .nav-group { display:flex; flex-direction:column; gap:12px; width:100%; align-items:center; }
        .nav-item {
            width:48px; height:48px; border-radius:24px; background:#111;
            display:flex; align-items:center; justify-content:center; color:var(--sub);
            font-size:18px; cursor:pointer; transition:0.2s; border:1px solid #1a1a1a;
        }
        .nav-item:hover, .nav-item.active { border-radius:12px; background:var(--acc); color:#fff; }
        .nav-item.active-ch { border-radius:12px; background:var(--gold); color:#fff; }

        .os-sub-pane { width:240px; background:var(--panel); border-right:1px solid #111; display:flex; flex-direction:column; }
        .pane-header { height:56px; border-bottom:1px solid #111; display:flex; align-items:center; padding:0 15px; font-size:12px; font-weight:bold; color:var(--sub); text-transform:uppercase; letter-spacing:1px; }
        .channel-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:4px; }
        .channel-item {
            display:flex; align-items:center; gap:10px; padding:10px; border-radius:8px;
            cursor:pointer; font-size:13px; color:#aaa; transition:0.2s; font-weight:500;
        }
        .channel-item:hover { background:#111; color:#fff; }
        .channel-item.active { background:#161616; color:#fff; border-left:3px solid var(--acc); border-radius:0 8px 8px 0; }
        .channel-pfp-mini { width:20px; height:20px; border-radius:4px; object-fit:cover; background:#222; }

        .os-chat-pane { flex:1; background:#000; display:flex; flex-direction:column; position:relative; }
        .chat-topbar { height:56px; border-bottom:1px solid #111; display:flex; align-items:center; padding:0 20px; justify-content:space-between; background:var(--panel); }
        .chat-title-area { display:flex; flex-direction:column; }
        .chat-main-title { font-size:15px; font-weight:bold; color:#fff; }
        .chat-sub-title { font-size:11px; color:var(--sub); margin-top:1px; }
                .chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; background:#000; }
        .msg-container { display:flex; gap:12px; max-width:85%; align-items:flex-start; }
        .msg-avatar-clickable { width:38px; height:38px; border-radius:50%; object-fit:cover; cursor:pointer; background:#222; border:1px solid #111; transition: transform 0.2s; }
        .msg-avatar-clickable:hover { transform: scale(1.05); }
        .msg-detail-area { display:flex; flex-direction:column; }
        .msg-header-row { display:flex; align-items:center; gap:6px; font-size:12px; margin-bottom:3px; }
        .msg-sender-name { font-weight:600; color:#fff; }
        .msg-time-stamp { color:var(--sub); font-size:10px; }
        .msg-text-bubble { background:#111; border:1px solid #1a1a1a; padding:10px 14px; border-radius:0 12px 12px 12px; font-size:13.5px; color:#eee; line-height:1.4; word-break:break-all; width:fit-content; }
        .msg-media-img { max-width:260px; max-height:180px; border-radius:8px; border:1px solid #222; cursor:pointer; margin-top:5px; display:block; }

        .chat-input-bar { height:62px; background:var(--panel); border-top:1px solid #111; display:flex; align-items:center; padding:0 15px; gap:12px; }
        .field-box { flex:1; position:relative; display:flex; align-items:center; }
        .field-main { width:100%; padding:10px 40px 10px 14px; background:#000; border:1px solid #222; border-radius:8px; color:#fff; outline:none; font-size:13.5px; }
        .field-main:focus { border-color: var(--acc); }
        .field-icon-btn { position:absolute; right:12px; color:var(--sub); cursor:pointer; font-size:16px; }
        .field-icon-btn:hover { color:var(--text); }
        .action-send-btn { width:38px; height:38px; background:var(--acc); border:none; border-radius:8px; color:#fff; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .action-send-btn:hover { background:#1e8e4c; }

        .loading-cover { position:absolute; top:56px; left:0; width:100%; height:calc(100% - 56px); background:#000; z-index:100; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--sub); }
        .loading-spinner { border: 2px solid #111; border-top: 2px solid var(--acc); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .os-modal-blur { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; align-items:center; justify-content:center; }
        .os-modal-box { background:var(--panel); border:1px solid #1a1a1a; width:360px; padding:22px; border-radius:14px; position:relative; box-shadow:0 15px 40px rgba(0,0,0,0.9); }
        .os-modal-close { position:absolute; top:12px; right:15px; color:var(--sub); cursor:pointer; font-size:18px; }
        .os-modal-close:hover { color:#fff; }
        
        .profile-card-layout { background:var(--panel); border:1px solid #1a1a1a; width:320px; border-radius:14px; overflow:hidden; box-shadow:0 15px 40px rgba(0,0,0,0.9); position:relative; }
        .profile-card-banner { height:85px; background:var(--acc); position:relative; }
        .profile-card-avatar-wrap { position:absolute; top:45px; left:16px; }
        .profile-card-avatar { width:70px; height:70px; border-radius:50%; object-fit:cover; border:4px solid var(--panel); background:#111; }
        .profile-card-body { padding:40px 16px 16px; }
        .profile-card-name { font-size:16px; font-weight:bold; color:#fff; display:flex; align-items:center; gap:5px; }
        .profile-card-uid { font-size:12px; color:var(--sub); margin-top:2px; }
        .profile-card-badges { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
        .profile-card-bio { background:#000; border:1px solid #151515; padding:10px; border-radius:8px; margin-top:12px; font-size:12.5px; color:#ccc; min-height:45px; word-break:break-all; }

        #toast-container { position:fixed; bottom:75px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:999999; pointer-events:none; }
        .os-toast { background:var(--panel); border:1px solid #222; border-left:4px solid var(--acc); color:#fff; padding:12px 18px; border-radius:6px; font-size:12.5px; box-shadow:0 5px 15px rgba(0,0,0,0.5); opacity:1; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-logo">FHeE T-OS</div>
            <div class="auth-subtitle">CORE INTELLIGENCE TERMINAL SYSTEM</div>
            <div class="auth-input-group">
                <label>USER ID / 住戶代碼</label>
                <input id="auth-uid" placeholder="請輸入全小寫登入帳號">
            </div>
            <div class="auth-input-group">
                <label>SECURITY PASSWORD / 憑證密碼</label>
                <input id="auth-pw" type="password" placeholder="請輸入安全登入密碼">
            </div>
            <button class="auth-btn" onclick="executeAuthLogin()">驗證身分並登入</button>
        </div>
    </div>

    <div id="os-main-layout">
        <div class="os-sidebar">
            <div class="nav-group">
                <div class="nav-item active" id="btn-tab-chat" onclick="toggleMainLayout('chat')">
                    <i class="fa-solid fa-messages"></i>
                </div>
            </div>
            <div class="nav-group">
                <div class="nav-item" id="user-btn" style="border-color:var(--acc); color:var(--acc);" onclick="openUserSettings()">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
            </div>
        </div>

        <div class="os-sub-pane" id="sidebar-channels-panel">
            <div class="pane-header">文字通訊分組</div>
            <div class="channel-list" id="dom-channel-box"></div>
        </div>

        <div class="os-chat-pane" id="main-chat-display-panel">
            <div class="chat-topbar">
                <div class="chat-title-area">
                    <div class="chat-main-title" id="lbl-channel-name">載入中...</div>
                    <div class="chat-sub-title" id="lbl-channel-desc"></div>
                </div>
            </div>

            <div class="chat-area" id="dom-chat-stream"></div>

            <div class="chat-input-bar">
                <div class="field-box">
                    <input class="field-main" id="tx-message-field" placeholder="選擇頻道發送核心通訊...">
                    <i class="fa-solid fa-image field-icon-btn" onclick="sendMediaMessage()"></i>
                </div>
                <button class="action-send-btn" onclick="sendTextMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>

            <div class="loading-cover" id="dom-stream-loader">
                <div class="loading-spinner"></div>
                <span>正在建立與雲端伺服器的安全通訊鏈...</span>
            </div>
        </div>
    </div>

    <div id="announcement-modal" class="os-modal-blur">
        <div class="os-modal-box">
            <h2 style="font-size:15px; font-weight:bold; color:var(--gold); margin:0 0 10px; display:flex; align-items:center; gap:6px;"><i class="fa-solid fa-bullhorn"></i> 官方至高神權廣播</h2>
            <div id="lbl-ann-title" style="font-weight:bold; font-size:13.5px; margin-bottom:4px; color:#fff;"></div>
            <div id="lbl-ann-content" style="font-size:12.5px; color:#aaa; line-height:1.5; background:#000; padding:10px; border-radius:6px; border:1px solid #111;"></div>
            <button class="auth-btn" style="background:var(--gold); margin-top:14px; padding:10px;" onclick="closeBroadcastNotice()">接收並關閉</button>
        </div>
    </div>
       <div id="user-modal" class="os-modal-blur">
        <div class="os-modal-box">
            <span class="os-modal-close" onclick="document.getElementById('user-modal').style.display='none'">&times;</span>
            <h2 style="font-size:15px; font-weight:bold; color:var(--acc); margin:0 0 15px;"><i class="fa-solid fa-user-gear"></i> 住戶個人設定與憑證維護</h2>
            
            <label style="display:block; font-size:11px; color:var(--sub); margin-bottom:5px;">修改住戶顯示名稱</label>
            <input id="set-username" style="width:100%; background:#000; border:1px solid #222; border-radius:6px; padding:10px; color:#fff; font-size:13px; outline:none; margin-bottom:12px;">
            
            <label style="display:block; font-size:11px; color:var(--sub); margin-bottom:5px;">修改大頭貼圖片網址 (URL)</label>
            <input id="set-avatar" style="width:100%; background:#000; border:1px solid #222; border-radius:6px; padding:10px; color:#fff; font-size:13px; outline:none; margin-bottom:12px;">
            
            <label style="display:block; font-size:11px; color:var(--sub); margin-bottom:5px;">個人橫幅背景 (圖片 URL 或 色彩代碼)</label>
            <input id="set-banner" style="width:100%; background:#000; border:1px solid #222; border-radius:6px; padding:10px; color:#fff; font-size:13px; outline:none; margin-bottom:12px;">
            
            <label style="display:block; font-size:11px; color:var(--sub); margin-bottom:5px;">自訂個人簡介 (BIOGRAPHY)</label>
            <textarea id="set-bio" rows="2" style="width:100%; background:#000; border:1px solid #222; border-radius:6px; padding:10px; color:#fff; font-size:13px; outline:none; margin-bottom:12px; resize:none;"></textarea>
            
            <div style="border-top:1px solid #1a1a1a; padding-top:10px; margin-top:5px;">
                <label style="display:block; font-size:11px; color:var(--danger); margin-bottom:5px;">如需修改安全密碼（選填）</label>
                <input id="set-pw-old" type="password" placeholder="請輸入原舊密碼驗證" style="width:100%; background:#000; border:1px solid #222; border-radius:6px; padding:10px; color:#fff; font-size:13px; outline:none; margin-bottom:8px;">
                <input id="set-pw-new" type="password" placeholder="請輸入欲變更之新密碼" style="width:100%; background:#000; border:1px solid #222; border-radius:6px; padding:10px; color:#fff; font-size:13px; outline:none; margin-bottom:12px;">
            </div>

            <button class="auth-btn" onclick="saveUserSettingsData()">儲存並同步憑證設定</button>
            <button class="auth-btn btn-danger" style="margin-top:10px;" onclick="executeAuthLogout()">安全登出此帳戶</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCT5bxjkt2xzABRaNaDFyV1zKg5R_yKxzo",
            authDomain: "fhee-e6867.firebaseapp.com",
            projectId: "fhee-e6867",
            storageBucket: "fhee-e6867.firebasestorage.app",
            databaseURL: "https://fhee-e6867-default-rtdb.firebaseio.com",
            messagingSenderId: "1054442416669",
            appId: "1:1054442416669:web:60f1c44f5dba08d0c174f4",
            measurementId: "G-VWRBQ1HC24"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUid = "";
        let myUserData = {};
        let activeChannelId = "ch1";
        let channelsConfig = {};
        let allUsersCache = {};

        window.onload = function() {
            const rememberedUid = localStorage.getItem("fhee_logged_uid");
            const rememberedTs = localStorage.getItem("fhee_login_ts") || 0;
            if (rememberedUid) {
                db.ref('users/' + rememberedUid).get().then(snap => {
                    const u = snap.val();
                    if (snap.exists() && u.status !== "停權" && (!u.force_logout_ts || u.force_logout_ts <= rememberedTs)) {
                        myUid = rememberedUid;
                        myUserData = u;
                        launchOSLayout();
                    } else {
                        localStorage.clear();
                    }
                }).catch(() => { localStorage.clear(); });
            }
        };

        function executeAuthLogin() {
            const uidInput = document.getElementById('auth-uid').value.trim().toLowerCase();
            const pwInput = document.getElementById('auth-pw').value.trim();

            if (!uidInput || !pwInput) {
                alert("✖ 欄位未填：請完整輸入使用者住戶帳號與密碼。");
                return;
            }

            db.ref('users/' + uidInput).get().then(snap => {
                if (!snap.exists()) {
                    alert("✖ 驗證失敗：帳號不存在或密碼輸入錯誤。");
                    return;
                }
                const u = snap.val();
                if (u.status === "停權") {
                    alert("✖ 存取受限：該帳戶目前已被系統安全機制停權封鎖。");
                    return;
                }
                if (u.password === pwInput) {
                    myUid = uidInput;
                    myUserData = u;
                    localStorage.setItem("fhee_logged_uid", myUid);
                    localStorage.setItem("fhee_login_ts", Date.now());
                    launchOSLayout();
                } else {
                    alert("✖ 驗證失敗：帳號不存在或密碼輸入錯誤。");
                }
            });
        }

        function launchOSLayout() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('os-main-layout').style.display = 'flex';

            db.ref('users/' + myUid).on('value', snap => {
                if (!snap.exists()) { executeAuthLogout(); return; }
                const u = snap.val();
                if (u.status === "停權") { executeAuthLogout(); return; }
                const localSavedTs = localStorage.getItem("fhee_login_ts") || 0;
                if (u.force_logout_ts && u.force_logout_ts > localSavedTs) { executeAuthLogout(); return; }
                myUserData = u;
            });

            db.ref('users').on('value', snap => { allUsersCache = snap.val() || {}; });

            db.ref('system_announcement').on('value', snap => {
                if (snap.exists()) {
                    const ann = snap.val();
                    document.getElementById('lbl-ann-title').innerText = ann.title;
                    document.getElementById('lbl-ann-content').innerText = ann.content;
                    document.getElementById('announcement-modal').style.display = 'flex';
                }
            });

            db.ref('channels_config').on('value', snap => {
                channelsConfig = snap.val() || {};
                syncChannelsToDOM();
            });
        }

        function syncChannelsToDOM() {
            const box = document.getElementById('dom-channel-box');
            box.innerHTML = "";

            const mainList = [
                { id: "ch1", title: "全球大廳", pfp: "https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=150" },
                { id: "ch2", title: channelsConfig.ch2_title || "頻道 2", pfp: channelsConfig.ch2_pfp },
                { id: "ch3", title: channelsConfig.ch3_title || "頻道 3", pfp: channelsConfig.ch3_pfp },
                { id: "ch4", title: channelsConfig.ch4_title || "頻道 4", pfp: channelsConfig.ch4_pfp }
            ];

            mainList.forEach(ch => {
                const div = document.createElement('div');
                div.className = "channel-item " + (activeChannelId === ch.id ? "active" : "");
                div.onclick = () => selectActiveChannel(ch.id, ch.title, "系統內建主要通訊分區");
                div.innerHTML = `<img class="channel-pfp-mini" src="${ch.pfp || 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=150'}"> <span>${escapeHTML(ch.title)}</span>`;
                box.appendChild(div);
            });

            const ch5Name = channelsConfig.ch5_title || "商業合作專區";
            const ch5Pfp = channelsConfig.ch5_pfp || "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=150";

            if (channelsConfig.ch5_subs) {
                Object.keys(channelsConfig.ch5_subs).forEach(subId => {
                    const sub = channelsConfig.ch5_subs[subId];
                    if (sub.visible) {
                        const div = document.createElement('div');
                        div.className = "channel-item " + (activeChannelId === subId ? "active" : "");
                        div.onclick = () => selectActiveChannel(subId, `${ch5Name} > ${sub.name}`, `指定通行身分標籤: ${sub.requiredBadge || '未限制'}`);
                        div.innerHTML = `<img class="channel-pfp-mini" src="${ch5Pfp}"> <span>${escapeHTML(sub.name)}</span>`;
                        box.appendChild(div);
                    }
                });
            }

            if (!document.querySelector('.channel-item.active') && activeChannelId !== "ch1") {
                selectActiveChannel("ch1", "全球大廳", "系統內建主要通訊分區");
            } else {
                reEvaluateTopbarTitle();
            }
        }
               function selectActiveChannel(id, title, desc) {
            db.ref(`messages/${activeChannelId}`).off();
            activeChannelId = id;
            document.getElementById('lbl-channel-name').innerText = title;
            document.getElementById('lbl-channel-desc').innerText = desc;

            document.querySelectorAll('.channel-item').forEach(item => {
                if (item.innerText.includes(title.split(" > ").pop())) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            startMessageStream();
        }

        function reEvaluateTopbarTitle() {
            const currentItem = document.querySelector('.channel-item.active');
            if (!currentItem && activeChannelId === "ch1") {
                document.getElementById('lbl-channel-name').innerText = "全球大廳";
                document.getElementById('lbl-channel-desc').innerText = "系統內建主要通訊分區";
            }
        }

        function startMessageStream() {
            const box = document.getElementById('dom-chat-stream');
            const loader = document.getElementById('dom-stream-loader');
            loader.style.display = 'flex';
            box.innerHTML = "";

            db.ref(`messages/${activeChannelId}`).limitToLast(100).on('value', snap => {
                box.innerHTML = "";
                loader.style.display = 'none';
                if (!snap.exists()) return;

                snap.forEach(child => {
                    const m = child.val();
                    const sender = allUsersCache[m.uid] || {};
                    const name = sender.username || m.username || "未知用戶";
                    const pfp = sender.avatar || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150";
                    const role = sender.role || m.role || "user";
                    const badge = sender.customBadge || m.customBadge || "";
                    const time = new Date(m.ts).toLocaleTimeString();

                    let badgesHTML = "";
                    if (role === "admin") badgesHTML += `<span class="badge-system-offi" style="background:#ff3333; color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; margin-left:5px; font-weight:bold; text-shadow:0 0 2px #000;">官方 ✔</span>`;
                    if (badge) badgesHTML += `<span class="badge-custom" style="background:#3b82f6; color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; margin-left:5px; font-weight:bold;">${escapeHTML(badge)}</span>`;

                    let bodyHTML = `<div class="msg-text-bubble">${escapeHTML(m.text)}</div>`;
                    if (m.type === "image") {
                        bodyHTML = `<img src="${encodeURI(m.imageUrl)}" class="msg-media-img" onclick="window.open('${encodeURI(m.imageUrl)}','_blank')">`;
                    }

                    const div = document.createElement('div');
                    div.className = "msg-container";
                    div.innerHTML = `
                        <img class="msg-avatar-clickable" src="${pfp}" onclick="triggerPopUserProfile('${m.uid}')">
                        <div class="msg-detail-area">
                            <div class="msg-header-row">
                                <span class="msg-sender-name">${escapeHTML(name)}</span>
                                ${badgesHTML}
                                <span class="msg-time-stamp">${time}</span>
                            </div>
                            ${bodyHTML}
                        </div>
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendTextMessage() {
            const input = document.getElementById('tx-message-field');
            const text = input.value.trim();
            if (!text) return;

            if (activeChannelId.startsWith("ch5_sub")) {
                const subConf = channelsConfig.ch5_subs ? channelsConfig.ch5_subs[activeChannelId] : null;
                if (subConf && subConf.requiredBadge && myUserData.customBadge !== subConf.requiredBadge && myUserData.role !== "admin") {
                    alert(`✖ 權限不足：此子頻道限制擁有 [${subConf.requiredBadge}] 身分標籤之成員發言！`);
                    return;
                }
            }

            db.ref(`messages/${activeChannelId}`).push({
                uid: myUid,
                username: myUserData.username,
                text: text,
                ts: Date.now(),
                type: "text",
                role: myUserData.role,
                customBadge: myUserData.customBadge || ""
            }).then(() => { input.value = ""; });
        }

        function sendMediaMessage() {
            const url = prompt("請輸入欲發送的圖片網址 (URL)：");
            if (!url) return;

            if (activeChannelId.startsWith("ch5_sub")) {
                const subConf = channelsConfig.ch5_subs ? channelsConfig.ch5_subs[activeChannelId] : null;
                if (subConf && subConf.requiredBadge && myUserData.customBadge !== subConf.requiredBadge && myUserData.role !== "admin") {
                    alert(`✖ 權限不足：此子頻道限制擁有 [${subConf.requiredBadge}] 身分標籤之成員發言！`);
                    return;
                }
            }

            db.ref(`messages/${activeChannelId}`).push({
                uid: myUid,
                username: myUserData.username,
                imageUrl: url,
                ts: Date.now(),
                type: "image",
                role: myUserData.role,
                customBadge: myUserData.customBadge || ""
            });
        }

        document.getElementById('tx-message-field').addEventListener('keydown', e => {
            if (e.keyCode === 13) sendTextMessage();
        });

        function openUserSettings() {
            document.getElementById('set-username').value = myUserData.username || "";
            document.getElementById('set-avatar').value = myUserData.avatar || "";
            document.getElementById('set-banner').value = myUserData.banner || "";
            document.getElementById('set-bio').value = myUserData.bio || "";
            document.getElementById('set-pw-old').value = "";
            document.getElementById('set-pw-new').value = "";
            document.getElementById('user-modal').style.display = 'flex';
        }

        function saveUserSettingsData() {
            const name = document.getElementById('set-username').value.trim();
            const pfp = document.getElementById('set-avatar').value.trim();
            const bnr = document.getElementById('set-banner').value.trim();
            const bio = document.getElementById('set-bio').value.trim();
            const pwOld = document.getElementById('set-pw-old').value.trim();
            const pwNew = document.getElementById('set-pw-new').value.trim();

            if (!name) return alert("顯示名稱不能為空");

            let updatePayload = {
                username: name,
                avatar: pfp || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150",
                banner: bnr || "#23a559",
                bio: bio || "該用戶很懶，什麼都沒留下..."
            };

            if (pwOld || pwNew) {
                if (!pwOld || !pwNew) {
                    alert("✖ 更改密碼失敗：必須同時填寫「原舊密碼」與「新密碼」方可驗證。");
                    return;
                }
                if (pwOld !== myUserData.password) {
                    alert("✖ 更改密碼失敗：原舊密碼輸入錯誤，未通過安全驗證。");
                    return;
                }
                if (pwNew.length < 4) {
                    alert("⚠️ 新密碼長度過短，請重新輸入。");
                    return;
                }
                updatePayload.password = pwNew;
            }

            db.ref(`users/${myUid}`).update(updatePayload).then(() => {
                showToast("💾 個人設定與安全憑證已同步儲存成功！");
                document.getElementById('user-modal').style.display = 'none';
            });
        }

        function triggerPopUserProfile(uid) {
            db.ref(`users/${uid}`).get().then(snap => {
                if (!snap.exists()) return;
                const u = snap.val();

                const bEl = document.getElementById('prof-banner');
                if (u.banner && (u.banner.startsWith("http") || u.banner.includes("."))) {
                    bEl.style.background = `url('${encodeURI(u.banner)}') center/cover no-repeat`;
                } else {
                    bEl.style.background = u.banner || "var(--acc)";
                }

                document.getElementById('prof-pfp').src = u.avatar || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150";
                document.getElementById('prof-name').innerText = u.username || "未命名";
                document.getElementById('prof-uid').innerText = `@${uid}`;
                document.getElementById('prof-bio').innerText = u.bio || "該用戶很懶，什麼都沒留下...";

                const bdBox = document.getElementById('prof-badges');
                bdBox.innerHTML = "";
                if (u.role === "admin") bdBox.innerHTML += `<span class="badge-system-offi" style="background:#ff3333; color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; margin-left:5px; font-weight:bold; text-shadow:0 0 2px #000;">官方 ✔</span>`;
                if (u.customBadge) bdBox.innerHTML += `<span class="badge-custom" style="background:#3b82f6; color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; margin-left:5px; font-weight:bold;">${escapeHTML(u.customBadge)}</span>`;

                document.getElementById('profile-modal').style.display = 'flex';
            });
        }

        function closeBroadcastNotice() {
            document.getElementById('announcement-modal').style.display = 'none';
        }

        function executeAuthLogout() {
            localStorage.clear();
            location.reload();
        }

        function toggleMainLayout(view) {}

        function showToast(text) {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = "os-toast";
            el.innerText = text;
            container.appendChild(el);
            setTimeout(() => {
                el.style.opacity = "0";
                el.style.transition = "opacity 0.5s";
                setTimeout(() => el.remove(), 500);
            }, 4000);
        }

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
    
    <div id="profile-modal" class="os-modal-blur" onclick="document.getElementById('profile-modal').style.display='none'">
        <div class="profile-card-layout" onclick="event.stopPropagation()">
            <div class="profile-card-banner" id="prof-banner"></div>
            <div class="profile-card-avatar-wrap">
                <img class="profile-card-avatar" id="prof-pfp" src="">
            </div>
            <div class="profile-card-body">
                <div class="profile-card-name" id="prof-name"></div>
                <div class="profile-card-uid" id="prof-uid"></div>
                <div class="profile-card-badges" id="prof-badges"></div>
                <div style="font-size:11px; color:var(--sub); font-weight:bold; margin-top:12px; text-transform:uppercase;">Biography / 個人自介</div>
                <div class="profile-card-bio" id="prof-bio"></div>
            </div>
        </div>
    </div>

</body>
</html>
